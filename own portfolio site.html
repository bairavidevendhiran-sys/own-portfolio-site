<!DOCTYPE html>
<html>
<head>
    <title>Jerry Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            scroll-behavior: smooth;
        }

        nav {
            background: #111;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            padding: 60px;
            text-align: center;
        }

        #home {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
        }

        .btn {
            background: black;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: orange;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0 0 10px gray;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</nav>

<section id="home">
    <h1>Hi, I'm bairavi</h1>
    <p>Engineering Student | Web Developer</p>
    <a href="resume.pdf" download>
        <button class="btn">Download Resume</button>
    </a>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>I love coding and building websites.</p>
</section>

<section id="skills">
    <h2>Skills</h2>
    <div class="card">HTML</div>
    <div class="card">CSS</div>
    <div class="card">Python</div>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="card">Calculator App</div>
    <div class="card">Portfolio Website</div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>Email: bairavidevendhiran@gmail.com</p>
</section>

</body>
</html>
